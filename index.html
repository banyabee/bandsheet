<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>D&D 캐릭터 시트</title>
    <style>
        body { background-color: #1a1a1a; color: #e0e0e0; font-family: sans-serif; padding: 20px; }
        
        /* 전체 레이아웃 */
        .sheet-grid { max-width: 900px; margin: auto; }
        
        /* 박스 디자인 */
        .box { border: 1px solid #7a0000; background: #252525; padding: 15px; border-radius: 4px; }
        
        /* 능력치들을 가로로 배치 */
        .stats-row { display: flex; justify-content: space-between; gap: 10px; }
        .stat-container { display: flex; flex-direction: column; align-items: center; gap: 5px; flex: 1; }
        
        .label { color: #cc3333; font-size: 0.8em; text-transform: uppercase; font-weight: bold; }
        
        /* 입력창 디자인 */
        .stat-input {
            background: #1a1a1a;
            color: #ffffff;
            border: 1px solid #7a0000;
            width: 80%;
            text-align: center;
            font-size: 1.5em;
            font-weight: bold;
            padding: 5px;
            border-radius: 4px;
        }
        .stat-modifier { font-size: 1.2em; color: #ffffff; margin-top: 5px; }
    </style>
</head>
<body>

    <div class="sheet-grid">
        <div class="box">
            <div class="stats-row">
                <!-- 능력치 6개 반복 -->
                <div class="stat-container">
                    <div class="label">힘</div>
                    <input type="number" class="stat-input" value="10" oninput="calculateModifier(this)">
                    <div class="stat-modifier">+0</div>
                </div>
                <div class="stat-container">
                    <div class="label">민첩</div>
                    <input type="number" class="stat-input" value="10" oninput="calculateModifier(this)">
                    <div class="stat-modifier">+0</div>
                </div>
                <div class="stat-container">
                    <div class="label">건강</div>
                    <input type="number" class="stat-input" value="10" oninput="calculateModifier(this)">
                    <div class="stat-modifier">+0</div>
                </div>
                <div class="stat-container">
                    <div class="label">지능</div>
                    <input type="number" class="stat-input" value="10" oninput="calculateModifier(this)">
                    <div class="stat-modifier">+0</div>
                </div>
                <div class="stat-container">
                    <div class="label">지혜</div>
                    <input type="number" class="stat-input" value="10" oninput="calculateModifier(this)">
                    <div class="stat-modifier">+0</div>
                </div>
                <div class="stat-container">
                    <div class="label">매력</div>
                    <input type="number" class="stat-input" value="10" oninput="calculateModifier(this)">
                    <div class="stat-modifier">+0</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        function calculateModifier(input) {
            let score = parseInt(input.value);
            if (isNaN(score)) return; 
            
            let mod = Math.floor((score - 10) / 2);
            let displayMod = (mod >= 0 ? "+" : "") + mod;
            
            input.nextElementSibling.innerText = displayMod;
        }
    </script>
</body>
    <div class="box" style="margin-top: 20px; text-align: center;">
    <button onclick="downloadHTML()" style="padding: 10px 20px; background: #7a0000; color: white; border: none; cursor: pointer; border-radius: 4px; font-weight: bold;">
        현재 시트 HTML로 저장하기
    </button>
</div>

<script>
    function downloadHTML() {
    // 1. 현재 화면에 입력된 모든 값을 각 태그의 value 속성에 반영
    const inputs = document.querySelectorAll('input');
    inputs.forEach(input => {
        input.setAttribute('value', input.value);
    });

    // 2. 이제 업데이트된 HTML 소스 추출
    const htmlContent = document.documentElement.outerHTML;
    
    // 3. 파일 생성 및 다운로드
    const blob = new Blob([htmlContent], { type: 'text/html' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = 'my-character-sheet.html';
    a.click();
    URL.revokeObjectURL(a.href);
}
</script>
</html>
