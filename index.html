<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>D&D 캐릭터 시트</title>
    <style>
        body { background-color: #1a1a1a; color: #e0e0e0; font-family: sans-serif; padding: 20px; }
        .save-btn { position: absolute; top: 20px; right: 20px; background: transparent; color: #cc3333; border: 1px solid #cc3333; padding: 5px 10px; cursor: pointer; border-radius: 3px; text-transform: uppercase; }
        .save-btn:hover { background: #cc3333; color: white; }

        .sheet-grid { max-width: 900px; margin: auto; margin-top: 40px; }
        .box { border: 1px solid #7a0000; background: #252525; padding: 15px; border-radius: 4px; margin-bottom: 20px; }
        
        .stats-row { display: flex; justify-content: space-between; gap: 10px; }
        .stat-container { display: flex; flex-direction: column; align-items: center; gap: 5px; flex: 1; }
        .label { color: #cc3333; font-size: 0.8em; text-transform: uppercase; font-weight: bold; }
        .stat-input { background: #1a1a1a; color: #ffffff; border: 1px solid #7a0000; width: 80%; text-align: center; font-size: 1.5em; font-weight: bold; padding: 5px; border-radius: 4px; }
        .stat-modifier { font-size: 1.2em; color: #ffffff; margin-top: 5px; }

        /* 토글 아이콘 스타일 */
        #skills-container { display: flex; flex-direction: column; gap: 8px; }
        .skill-row { display: flex; align-items: center; gap: 10px; border-bottom: 1px solid #444; padding: 5px 0; }
        
        .prof-icon {
            width: 16px; height: 16px;
            background: #555;
            cursor: pointer;
            transition: all 0.2s;
            border-radius: 50%; /* 초기값: 원형 */
        }
        .prof-icon.is-star {
            clip-path: polygon(50% 0%, 61% 35%, 98% 35%, 68% 57%, 79% 91%, 50% 70%, 21% 91%, 32% 57%, 2% 35%, 39% 35%);
            border-radius: 0; /* 별 모양일 땐 원형 초기화 */
        }
        .prof-icon.active { background: #e0e0e0; }
        
        .skill-mod { font-size: 0.75em; color: #888; width: 30px; }
        .skill-name { flex-grow: 1; font-size: 0.9em; }
        .skill-bonus-input { width: 35px; background: #1a1a1a; color: white; border: 1px solid #7a0000; text-align: center; padding: 2px; }
    </style>
</head>
<body>

    <button class="save-btn" onclick="downloadHTML()">저장</button>

    <div class="sheet-grid">
        <div class="box">
            <div class="stats-row">
                <div class="stat-container"><div class="label">힘</div><input type="number" class="stat-input" data-stat="str" value="10" oninput="saveAndCalc(this)"><div class="stat-modifier">+0</div></div>
                <div class="stat-container"><div class="label">민첩</div><input type="number" class="stat-input" data-stat="dex" value="10" oninput="saveAndCalc(this)"><div class="stat-modifier">+0</div></div>
                <div class="stat-container"><div class="label">건강</div><input type="number" class="stat-input" data-stat="con" value="10" oninput="saveAndCalc(this)"><div class="stat-modifier">+0</div></div>
                <div class="stat-container"><div class="label">지능</div><input type="number" class="stat-input" data-stat="int" value="10" oninput="saveAndCalc(this)"><div class="stat-modifier">+0</div></div>
                <div class="stat-container"><div class="label">지혜</div><input type="number" class="stat-input" data-stat="wis" value="10" oninput="saveAndCalc(this)"><div class="stat-modifier">+0</div></div>
                <div class="stat-container"><div class="label">매력</div><input type="number" class="stat-input" data-stat="cha" value="10" oninput="saveAndCalc(this)"><div class="stat-modifier">+0</div></div>
            </div>
        </div>

        <div class="box" style="width: 300px;">
            <div id="skills-container">
                <div class="skill-row"><div class="prof-icon" onclick="toggleIcon(this)"></div><span class="skill-mod">DEX</span><span class="skill-name">Acrobatics (곡예)</span><input type="number" class="skill-bonus-input" value="3"></div>
                <div class="skill-row"><div class="prof-icon" onclick="toggleIcon(this)"></div><span class="skill-mod">WIS</span><span class="skill-name">Animal Handling (동물 조련)</span><input type="number" class="skill-bonus-input" value="0"></div>
            </div>
            <div style="text-align: center; margin-top: 15px; font-size: 0.8em; color: #cc3333; font-weight: bold;">SKILLS</div>
        </div>
    </div>

    <script>
        // 클릭할 때마다 상태와 모양 변경
        function toggleIcon(el) {
            if (!el.classList.contains('active')) {
                el.classList.add('active'); // 원형 채우기
            } else if (!el.classList.contains('is-star')) {
                el.classList.add('is-star'); // 별 모양으로 변경
            } else {
                el.classList.remove('active', 'is-star'); // 초기화
            }
        }

        function saveAndCalc(input) { localStorage.setItem(input.dataset.stat, input.value); let mod = Math.floor((parseInt(input.value)-10)/2); input.nextElementSibling.innerText = (mod>=0?"+":"")+mod; }
        function downloadHTML() { const a = document.createElement('a'); a.href = URL.createObjectURL(new Blob([document.documentElement.outerHTML], { type: 'text/html' })); a.download = 'sheet.html'; a.click(); }
    </script>
</body>
</html>
