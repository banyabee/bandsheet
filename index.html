<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>나의 D&D 캐릭터 시트</title>
    <style>
        body { background-color: #1a1a1a; color: white; font-family: sans-serif; padding: 20px; }
        .sheet-container { display: grid; grid-template-columns: 200px 1fr; gap: 20px; max-width: 900px; margin: auto; }
        .box { border: 1px solid #444; background: #2a2a2a; padding: 15px; border-radius: 5px; }
        .stat { font-size: 2em; font-weight: bold; text-align: center; color: #ffcc00; }
        .label { font-size: 0.8em; text-transform: uppercase; color: #aaa; text-align: center; }
    </style>
</head>
<body>
    <div class="sheet-container">
        <div class="box">
            <div class="label">STR</div>
            <div class="stat">16 (+3)</div>
        </div>
        <div class="box">
            <h1>캐릭터 이름</h1>
            <p>직업: 파이터 / 종족: 휴먼</p>
        </div>
    </div>
</body>
</html>
