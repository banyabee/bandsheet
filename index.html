<script>
    function updateModifier(input) {
        // (입력값 - 10) / 2를 해서 보정치를 계산하는 로직
        let val = input.value;
        let mod = Math.floor((val - 10) / 2);
        input.nextElementSibling.innerText = (mod >= 0 ? "+" : "") + mod;
    }
</script>

<!-- 위쪽 input 태그에 oninput="updateModifier(this)"를 추가하세요 -->
<input type="number" class="stat-input" value="10" oninput="updateModifier(this)">
<div class="stat-modifier">+0</div>
