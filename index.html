<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>D&D 캐릭터 시트</title>
    <style>
        body { background-color: #1a1a1a; color: #e0e0e0; font-family: sans-serif; padding: 20px; }
        
        .save-btn { position: absolute; top: 20px; right: 20px; background: transparent; color: #cc3333; border: 1px solid #cc3333; padding: 5px 10px; cursor: pointer; border-radius: 3px; }
        .save-btn:hover { background: #cc3333; color: white; }

        .sheet-grid { display: grid; grid-template-columns: 300px 1fr; gap: 20px; max-width: 1000px; margin: auto; margin-top: 40px; }
        .box { border: 1px solid #7a0000; background: #252525; padding: 15px; border-radius: 4px; }
        
        /* 기술 표 스타일 */
        .skill-row { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; font-size: 0.9em; }
        .prof-dot { width: 10px; height: 10px; border: 1px solid #cc3333; border-radius: 50%; cursor: pointer; }
        .prof-dot.active { background: #cc3333; }
        .skill-mod { color: #888; width: 30px; font-size: 0.8em; }
        .skill-name { flex-grow: 1; }
        .skill-bonus { border: 1px solid #555; padding: 2px 8px; border-radius: 3px; min-width: 30px; text-align: center; }
    </style>
</head>
<body>

    <button class="save-btn" onclick="downloadHTML()">저장</button>

    <div class="sheet-grid">
        <div class="box">
            <div id="skills-container">
                <div class="skill-row"><div class="prof-dot" onclick="this.classList.toggle('active')"></div><span class="skill-mod">민첩</span><span class="skill-name">곡예 (Acrobatics)</span><span class="skill-bonus">+3</span></div>
                <div class="skill-row"><div class="prof-dot" onclick="this.classList.toggle('active')"></div><span class="skill-mod">지혜</span><span class="skill-name">동물 조련 (Animal Handling)</span><span class="skill-bonus">+0</span></div>
                <div class="skill-row"><div class="prof-dot" onclick="this.classList.toggle('active')"></div><span class="skill-mod">지능</span><span class="skill-name">비전학 (Arcana)</span><span class="skill-bonus">-1</span></div>
                <div class="skill-row"><div class="prof-dot" onclick="this.classList.toggle('active')"></div><span class="skill-mod">근력</span><span class="skill-name">운동 (Athletics)</span><span class="skill-bonus">+2</span></div>
            </div>
            <div style="text-align: center; margin-top: 15px; font-size: 0.8em; color: #cc3333;">기술 (SKILLS)</div>
        </div>

        <div class="box">
            <h3>추가 내용 영역</h3>
            <p>여기에 주문, 특징, 혹은 인벤토리 등을 배치하세요.</p>
        </div>
    </div>

    <script>
        function downloadHTML() {
            const htmlContent = document.documentElement.outerHTML;
            const blob = new Blob([htmlContent], { type: 'text/html' });
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = 'my-character-sheet.html';
            a.click();
        }
    </script>
</body>
</html>
